name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger a build manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Generate app icons
        run: |
          mkdir -p app/src/main/res/drawable app/src/main/res/mipmap-anydpi-v26
          printf '%s' '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#6C63FF"/></shape>' > app/src/main/res/drawable/ic_launcher_background.xml
          printf '%s' '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@drawable/ic_launcher_background"/><foreground android:drawable="@drawable/ic_launcher_background"/></adaptive-icon>' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Write Kotlin sources from base64
        run: |
          KT=app/src/main/java/com/hdcutter/bgremover
          echo "" | base64 -d > $KT/ApiKeyDialogFragment.kt
          echo "" | base64 -d > $KT/SubjectSegmentHelper.kt
          echo "" | base64 -d > $KT/RemoveBgApiHelper.kt
          echo "" | base64 -d > $KT/ProcessActivity.kt

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BGRemover-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
